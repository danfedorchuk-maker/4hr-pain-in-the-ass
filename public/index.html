<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swing Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a24;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #e8e8f0;
  --text2: #8888aa;
  --text3: #555570;
  --green: #00c896;
  --green-dim: rgba(0,200,150,0.12);
  --amber: #f0a832;
  --amber-dim: rgba(240,168,50,0.12);
  --blue: #4d9ef5;
  --blue-dim: rgba(77,158,245,0.12);
  --red: #f05050;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  padding: 0;
}

/* TOP NAV */
.nav {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text);
}

.nav-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-time {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text3);
}

/* MAIN LAYOUT */
.main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem;
}

/* API BAR */
.api-bar {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.api-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
}

.api-input {
  flex: 1;
  min-width: 200px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}

.api-input:focus { border-color: var(--border2); }
.api-input::placeholder { color: var(--text3); }

.btn-scan {
  background: var(--green);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 8px 24px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.2s, transform 0.1s;
}

.btn-scan:hover { opacity: 0.9; }
.btn-scan:active { transform: scale(0.97); }
.btn-scan:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

.btn-save {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 16px;
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn-save:hover { border-color: var(--border2); color: var(--text); }

/* STATUS / PROGRESS */
.progress-wrap {
  margin-bottom: 1.5rem;
}

.progress-track {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  margin-bottom: 8px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--green);
  width: 0%;
  transition: width 0.3s ease;
}

.status-text {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text3);
  min-height: 16px;
}

/* SUMMARY ROW */
.summary-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 1.5rem;
}

.summary-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}

.s-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

.s-value {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 600;
  color: var(--text);
  line-height: 1;
}

.s-value.green { color: var(--green); }
.s-value.amber { color: var(--amber); }
.s-value.blue { color: var(--blue); }

/* FILTERS */
.filters {
  display: flex;
  gap: 8px;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
  align-items: center;
}

.filter-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  margin-right: 4px;
}

.filter-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}

.filter-btn:hover { border-color: var(--border2); color: var(--text); }
.filter-btn.active { background: var(--bg3); border-color: var(--border2); color: var(--text); }

.sort-select {
  margin-left: auto;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 12px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  outline: none;
}

/* RESULTS GRID */
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
}

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 5rem 2rem;
  color: var(--text3);
  font-family: var(--mono);
  font-size: 14px;
}

/* PAIR CARD */
.pair-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  transition: border-color 0.2s;
  position: relative;
  overflow: hidden;
}

.pair-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}

.pair-card.sig-ready::before { background: var(--green); }
.pair-card.sig-consolidating::before { background: var(--amber); }
.pair-card.sig-watch::before { background: var(--blue); }
.pair-card.sig-none::before { background: var(--border); }

.pair-card:hover { border-color: var(--border2); }

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.pair-name {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
}

.signal-pill {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 12px;
}

.pill-ready { background: var(--green-dim); color: var(--green); }
.pill-consolidating { background: var(--amber-dim); color: var(--amber); }
.pill-watch { background: var(--blue-dim); color: var(--blue); }
.pill-none { background: var(--bg3); color: var(--text3); }

.card-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.stat-block { }

.stat-lbl {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 3px;
}

.stat-val {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}

.stat-val.up { color: var(--green); }
.stat-val.down { color: var(--red); }
.stat-val.warn { color: var(--amber); }
.stat-val.ok { color: var(--green); }

.divider {
  height: 1px;
  background: var(--border);
  margin: 10px 0;
}

.h1-signal {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 10px;
}

.h1-signal.fire { border-color: var(--amber); color: var(--amber); }
.h1-signal.break-up { border-color: var(--green); color: var(--green); }
.h1-signal.break-down { border-color: var(--red); color: var(--red); }

.h1-icon { font-size: 14px; margin-top: 1px; flex-shrink: 0; }

.card-footer {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
}

/* LEGEND */
.legend {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 1.25rem;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

@media (max-width: 700px) {
  .main { padding: 1rem; }
  .summary-row { grid-template-columns: 1fr 1fr; }
  .nav { padding: 0 1rem; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-dot"></div>
    SWING SCANNER
  </div>
  <div class="nav-right">
    <span class="nav-time" id="navTime"></span>
  </div>
</nav>

<div class="main">

  <div class="api-bar">
    <span class="api-label">Twelve Data</span>
    <input class="api-input" type="password" id="apiKey" placeholder="API key" autocomplete="off" />
    <button class="btn-save" onclick="saveKey()">Save key</button>
    <button class="btn-scan" id="scanBtn" onclick="startScan()">▶ Scan all pairs</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="status-text" id="statusText">Enter Twelve Data API key and scan.</div>
  </div>

  <div class="summary-row">
    <div class="summary-card">
      <div class="s-label">Pairs scanned</div>
      <div class="s-value" id="sumTotal">—</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Ready</div>
      <div class="s-value green" id="sumReady">—</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Consolidating</div>
      <div class="s-value amber" id="sumCons">—</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Watch</div>
      <div class="s-value blue" id="sumWatch">—</div>
    </div>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:var(--green)"></span>Ready — 300+ pip swing, MA aligned, H4 clear</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--amber)"></span>Consolidating — breakout may be imminent</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span>Watch — swing building</span>
  </div>

  <div class="filters">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('ready',this)">Ready</button>
    <button class="filter-btn" onclick="setFilter('consolidating',this)">Consolidating</button>
    <button class="filter-btn" onclick="setFilter('watch',this)">Watch</button>
    <select class="sort-select" id="sortSelect" onchange="renderResults(lastResults)">
      <option value="signal">Sort: signal strength</option>
      <option value="pips">Sort: pip move</option>
      <option value="pair">Sort: pair name</option>
    </select>
  </div>

  <div class="results-grid" id="resultsGrid">
    <div class="empty-state">No scan run yet.</div>
  </div>

</div>

<script>
const PAIRS = [
  'GBP/JPY','EUR/USD','GBP/USD','USD/JPY','EUR/JPY',
  'AUD/USD','USD/CAD','USD/CHF','NZD/USD','EUR/GBP',
  'EUR/CHF','EUR/AUD','EUR/CAD','EUR/NZD',
  'GBP/CHF','GBP/AUD','GBP/CAD','GBP/NZD',
  'AUD/JPY','CAD/JPY','CHF/JPY','NZD/JPY',
  'AUD/CAD','AUD/CHF','AUD/NZD',
  'USD/MXN','USD/SGD','USD/NOK'
];

const PIP_FACTORS = { JPY:0.01, MXN:0.001, NOK:0.001 };
const pipFactor = p => PIP_FACTORS[p.split('/')[1]] || 0.0001;
const toPips = (diff, pair) => Math.round(Math.abs(diff) / pipFactor(pair));

let currentFilter = 'all';
let lastResults = [];

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('navTime').textContent =
    now.toUTCString().slice(17,25) + ' UTC';
}
setInterval(updateClock, 1000);
updateClock();

// Key persistence
window.addEventListener('load', () => {
  const saved = localStorage.getItem('td_api_key');
  if (saved) document.getElementById('apiKey').value = saved;
});

function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  if (k) { localStorage.setItem('td_api_key', k); alert('Key saved.'); }
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderResults(lastResults);
}

async function fetchCandles(sym, interval, key, outputsize) {
  const s = sym.replace('/','');
  const url = `https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(s)}&interval=${interval}&outputsize=${outputsize}&apikey=${key}&format=JSON`;
  const r = await fetch(url);
  const d = await r.json();
  if (!d.values || d.status==='error') throw new Error(d.message||'API error');
  return d.values.map(v=>({
    time: v.datetime,
    open: parseFloat(v.open),
    high: parseFloat(v.high),
    low: parseFloat(v.low),
    close: parseFloat(v.close)
  })).reverse();
}

function findSwing(candles, pair) {
  const recent = candles.slice(-60);
  let hi=-Infinity,hiIdx=0,lo=Infinity,loIdx=0;
  recent.forEach((c,i)=>{
    if(c.high>hi){hi=c.high;hiIdx=i;}
    if(c.low<lo){lo=c.low;loIdx=i;}
  });
  const pips = toPips(hi-lo, pair);
  const direction = hiIdx < loIdx ? 'DOWN' : 'UP';
  return { swingHigh:hi, swingLow:lo, pips, direction, hiIdx, loIdx };
}

function detectConsolidation(candles, pair, lookback=8) {
  const last = candles.slice(-lookback);
  let hi=-Infinity, lo=Infinity;
  last.forEach(c=>{ if(c.high>hi)hi=c.high; if(c.low<lo)lo=c.low; });
  const rangePips = toPips(hi-lo, pair);
  return { consolidating: rangePips < 80, rangePips, rangeHigh:hi, rangeLow:lo, count:lookback };
}

function calcMA(candles, period) {
  if(candles.length<period) return null;
  return candles.slice(-period).reduce((s,c)=>s+c.close,0)/period;
}

function calcMACD(candles) {
  if(candles.length<35) return { bullish: null };
  const closes = candles.map(c=>c.close);
  function ema(data, p) {
    const k=2/(p+1); let e=data[0];
    for(let i=1;i<data.length;i++) e=data[i]*k+e*(1-k);
    return e;
  }
  const macd = ema(closes,12) - ema(closes,26);
  return { bullish: macd>0, value: macd };
}

async function analyzePair(pair, key) {
  const sym = pair.replace('/','');
  const [h4, h1] = await Promise.all([
    fetchCandles(sym,'4h',key,90),
    fetchCandles(sym,'1h',key,50).catch(()=>null)
  ]);

  const swing = findSwing(h4, pair);
  const h4cons = detectConsolidation(h4, pair);
  const ma9 = calcMA(h4,9);
  const ma20 = calcMA(h4,20);
  const macd = calcMACD(h4);
  const last = h4[h4.length-1];
  const prev = h4[h4.length-2];

  const maAligned = swing.direction==='UP' ? ma9>ma20 : ma9<ma20;
  const macdAligned = swing.direction==='UP' ? macd.bullish===true : macd.bullish===false;
  const stopRef = swing.direction==='UP' ? prev.low : prev.high;
  const stopPips = toPips(Math.abs(last.close - stopRef), pair);

  let h1Signal = null;
  if(h1) {
    const h1cons = detectConsolidation(h1, pair, 6);
    if(h1cons.consolidating) {
      const lc = h1[h1.length-1].close;
      if(swing.direction==='UP' && lc > h1cons.rangeHigh) {
        h1Signal = { type:'BREAK UP', stop: toPips(lc-h1cons.rangeLow, pair), rangePips: h1cons.rangePips };
      } else if(swing.direction==='DOWN' && lc < h1cons.rangeLow) {
        h1Signal = { type:'BREAK DOWN', stop: toPips(h1cons.rangeHigh-lc, pair), rangePips: h1cons.rangePips };
      } else {
        h1Signal = { type:'CONSOLIDATING', rangePips: h1cons.rangePips };
      }
    }
  }

  let sig;
  if(swing.pips>=300 && maAligned && !h4cons.consolidating) sig='ready';
  else if(h4cons.consolidating && swing.pips>=200) sig='consolidating';
  else if(swing.pips>=200) sig='watch';
  else sig='none';

  return { pair, sig, swing, h4cons, ma9, ma20, maAligned, macdAligned, stopPips, h1Signal, last };
}

function sigOrder(s){ return {ready:0,consolidating:1,watch:2,none:3}[s]||3; }

function renderResults(results) {
  lastResults = results;
  const sort = document.getElementById('sortSelect').value;
  let filtered = results.filter(r=> currentFilter==='all' || r.sig===currentFilter);

  filtered.sort((a,b)=>{
    if(sort==='pips') return b.swing.pips - a.swing.pips;
    if(sort==='pair') return a.pair.localeCompare(b.pair);
    return sigOrder(a.sig) - sigOrder(b.sig);
  });

  document.getElementById('sumTotal').textContent = results.length;
  document.getElementById('sumReady').textContent = results.filter(r=>r.sig==='ready').length;
  document.getElementById('sumCons').textContent = results.filter(r=>r.sig==='consolidating').length;
  document.getElementById('sumWatch').textContent = results.filter(r=>r.sig==='watch').length;

  if(!filtered.length){
    document.getElementById('resultsGrid').innerHTML='<div class="empty-state">No pairs match this filter.</div>';
    return;
  }

  document.getElementById('resultsGrid').innerHTML = filtered.map(r=>{
    const pillClass = {ready:'pill-ready',consolidating:'pill-consolidating',watch:'pill-watch',none:'pill-none'}[r.sig];
    const pillText = {ready:'Ready',consolidating:'Consolidating',watch:'Watch',none:'No setup'}[r.sig];
    const cardClass = {ready:'sig-ready',consolidating:'sig-consolidating',watch:'sig-watch',none:'sig-none'}[r.sig];
    const dirClass = r.swing.direction==='UP'?'up':'down';
    const dirArrow = r.swing.direction==='UP'?'↑':'↓';

    let h1Html = '';
    if(r.h1Signal){
      const cls = r.h1Signal.type==='BREAK UP'?'break-up':r.h1Signal.type==='BREAK DOWN'?'break-down':'fire';
      const icon = r.h1Signal.type==='CONSOLIDATING'?'⏳':r.h1Signal.type==='BREAK UP'?'🔼':'🔽';
      const msg = r.h1Signal.type==='CONSOLIDATING'
        ? `H1 consolidating — ${r.h1Signal.rangePips} pip range, wait for break`
        : `${r.h1Signal.type} on H1 — stop ~${r.h1Signal.stop} pip below range`;
      h1Html = `<div class="h1-signal ${cls}"><span class="h1-icon">${icon}</span><span>${msg}</span></div>`;
    }

    const ma9f = r.ma9 ? r.ma9.toFixed(pipFactor(r.pair)>0.001?3:5) : '—';
    const ma20f = r.ma20 ? r.ma20.toFixed(pipFactor(r.pair)>0.001?3:5) : '—';

    return `
<div class="pair-card ${cardClass}">
  <div class="card-top">
    <span class="pair-name">${r.pair}</span>
    <span class="signal-pill ${pillClass}">${pillText}</span>
  </div>
  <div class="card-stats">
    <div class="stat-block">
      <div class="stat-lbl">Swing</div>
      <div class="stat-val ${dirClass}">${dirArrow} ${r.swing.pips} pip</div>
    </div>
    <div class="stat-block">
      <div class="stat-lbl">H4 range</div>
      <div class="stat-val ${r.h4cons.consolidating?'warn':'ok'}">${r.h4cons.consolidating?r.h4cons.rangePips+' pip ⚠':'clear'}</div>
    </div>
    <div class="stat-block">
      <div class="stat-lbl">Stop</div>
      <div class="stat-val">${r.stopPips} pip</div>
    </div>
    <div class="stat-block">
      <div class="stat-lbl">MA 9/20</div>
      <div class="stat-val ${r.maAligned?'ok':'warn'}">${r.maAligned?'aligned':'mixed'}</div>
    </div>
    <div class="stat-block">
      <div class="stat-lbl">MACD</div>
      <div class="stat-val ${r.macdAligned?'ok':'warn'}">${r.macdAligned?'aligned':'mixed'}</div>
    </div>
    <div class="stat-block">
      <div class="stat-lbl">Direction</div>
      <div class="stat-val ${dirClass}">${r.swing.direction}</div>
    </div>
  </div>
  ${h1Html}
  <div class="divider"></div>
  <div class="card-footer">
    <span>${r.swing.direction==='UP'?'Long':'Short'} — prev candle stop</span>
    <span>Price: ${r.last.close.toFixed(pipFactor(r.pair)>0.001?3:5)}</span>
  </div>
</div>`;
  }).join('');
}

async function startScan() {
  const key = document.getElementById('apiKey').value.trim();
  if(!key){ alert('Enter Twelve Data API key.'); return; }

  const btn = document.getElementById('scanBtn');
  const status = document.getElementById('statusText');
  const fill = document.getElementById('progressFill');

  btn.disabled=true; fill.style.width='0%';
  const results=[]; const errors=[]; let done=0;

  const BATCH=3;
  for(let i=0; i<PAIRS.length; i+=BATCH){
    const batch=PAIRS.slice(i,i+BATCH);
    await Promise.all(batch.map(async pair=>{
      try{
        status.textContent=`Scanning ${pair}…`;
        const r=await analyzePair(pair,key);
        if(r) results.push(r);
      }catch(e){ errors.push(pair); }
      done++;
      fill.style.width=Math.round((done/PAIRS.length)*100)+'%';
    }));
    if(i+BATCH<PAIRS.length) await new Promise(res=>setTimeout(res,400));
  }

  renderResults(results);
  status.textContent=`Complete — ${results.length} pairs scanned, ${results.filter(r=>r.sig==='ready').length} ready, ${errors.length} errors${errors.length?' ('+errors.join(', ')+')':''}. Last scan: ${new Date().toUTCString().slice(0,25)}`;
  btn.disabled=false;
  fill.style.width='100%';
}
</script>
